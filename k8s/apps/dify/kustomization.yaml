apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dify

helmCharts:
  # https://langgenius.github.io/dify-helm/
  - name: dify
    releaseName: dify
    namespace: dify
    version: 3.8.0
    repo: https://langgenius.github.io/dify-helm
    includeCRDs: true
    valuesInline:
      api:
        enabled: true
      enterprise:
        enabled: false
      enterpriseAudit:
        enabled: false
      enterpriseCollector:
        enabled: false
      enterpriseFrontend:
        enabled: false
      externalDatabase:
        enabled: false
      externalRedis:
        enabled: false
      gateway:
        replicas: 0
      global:
        appApiDomain: dify-api.starry.blue
        appSecretKey: dummy # 1Password で管理するのでダミー値を設定
        appWebDomain: dify.starry.blue
        consoleApiDomain: dify-api.starry.blue
        consoleWebDomain: dify.starry.blue
        customCA:
          enabled: false
        dbMigrationEnabled: true
        edition: SELF_HOSTED
        enterpriseDomain: dify-enterprise-dummy.internal
        filesDomain: dify.starry.blue
        innerApiKey: dummy # 1Password で管理するのでダミー値を設定
        otel:
          enabled: false
        serviceApiDomain: dify-api.starry.blue
        useTLS: true
      ingress:
        enabled: false
      mail:
        type: ""
      minio:
        enabled: false
      persistence:
        local:
          annotations:
            helm.sh/resource-policy: keep
          mountPath: /app/api/storage
          persistentVolumeClaim:
            existingClaim: dify-storage
        type: local
      plugin_daemon:
        enabled: false
      plugin_manager:
        enabled: false
      postgresql:
        enabled: true
        global:
          postgresql:
            auth:
              database: dify
              postgresPassword: dummy
          storageClass: local
        primary:
          extraEnvVars:
            - name: TZ
              value: Asia/Tokyo
          persistence:
            existingClaim: dify-postgresql-data
          resourcesPreset: nano
      qdrant:
        enabled: false
      redis:
        auth:
          enabled: false
        enabled: true
        master:
          persistence:
            enabled: false
        replica:
          persistence:
            enabled: false
          replicaCount: 0
      sandbox:
        enabled: true
      ssrfProxy:
        enabled: true
      triggerWorker:
        enabled: false
      unstructured:
        enabled: false
      vectorDB:
        useExternal: false
      weaviate:
        enabled: false
      web:
        enabled: true
        replicas: 1
      worker:
        enabled: true
        replicas: 1
      workerBeat:
        enabled: true

resources:
  - ./resources/dns.yaml
  - ./resources/ingress.yaml
  - ./resources/secret.yaml
  - ./resources/volume-postgresql.yaml
  - ./resources/volume-storage.yaml

patches:
  # dify-postgresql Secret は 1Password で管理されるので自動で作成されるシークレットを空にする
  - target:
      version: v1
      kind: Secret
      name: dify-postgresql
    patch: |-
      - op: remove
        path: /data
