apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: server
          image: ghcr.io/slashnephy/nebula-backend:main@sha256:94b7dc6b73271fdf15beb0877e83602324e346d1bbb59d0608c0e10b6c666742
          env:
            - name: SERVER_ADDRESS
              value: ":8080"
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              readOnly: true
            - name: media
              mountPath: /app/media
            - name: thumbnails
              mountPath: /app/thumbnails
            - name: avatars
              mountPath: /app/avatars
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          hostPath:
            path: /mnt/local/nebula/config.yaml
            type: File
        - name: media
          hostPath:
            path: /mnt/local/nebula/media
            type: Directory
        - name: thumbnails
          hostPath:
            path: /mnt/local/nebula/thumbnails
            type: Directory
        - name: avatars
          hostPath:
            path: /mnt/local/nebula/avatars
            type: Directory
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
