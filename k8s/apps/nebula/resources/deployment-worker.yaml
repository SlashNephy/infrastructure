apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker

spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/slashnephy/nebula-worker:main@sha256:f6740442ed45c11087588c95402fdf7b3258563a32abc7618a5c5160ec36dac9
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: thumbnails
              mountPath: /app/thumbnails
            - name: avatars
              mountPath: /app/avatars
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: media
          hostPath:
            path: /mnt/local/nebula/media
            type: Directory
        - name: thumbnails
          hostPath:
            path: /mnt/local/nebula/thumbnails
            type: Directory
        - name: avatars
          hostPath:
            path: /mnt/local/nebula/avatars
            type: Directory
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 90
