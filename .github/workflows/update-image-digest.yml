name: Update Image Digest

on:
  repository_dispatch:
    types:
      - update-image-digest

concurrency:
  group: update-image-digest
  cancel-in-progress: false

permissions: {}

jobs:
  update-image-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cmd/update-image-digest/go.mod
          cache-dependency-path: cmd/update-image-digest/go.sum

      - name: Update Image Digest
        run: |
          GOWORK=off GOTOOLCHAIN=local go build -C cmd/update-image-digest -o "$RUNNER_TEMP/update-image-digest" .
          "$RUNNER_TEMP/update-image-digest" -i "$IMAGES" -d "$DIGEST"
        env:
          IMAGES: ${{ join(github.event.client_payload.images, ',') }}
          DIGEST: ${{ github.event.client_payload.digest }}

      - name: Create Pull Request
        id: create-pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: |
            update ${{ github.event.client_payload.images[0] }} 🔜 ${{ github.event.client_payload.digest }}

            https://github.com/${{ github.event.client_payload.github.repository }}/commit/${{ github.event.client_payload.github.sha }}
          author: StarryBlueSky-bot <97773209+StarryBlueSky-bot@users.noreply.github.com>
          branch: ci/update-image-digest
          branch-suffix: random
          title: update ${{ github.event.client_payload.images[0] }} 🔜 ${{ github.event.client_payload.digest }}
          body: https://github.com/${{ github.event.client_payload.github.repository }}/commit/${{ github.event.client_payload.github.sha }}

      - run: gh pr merge --squash $PR_NUMBER
        if: steps.create-pull-request.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number }}
