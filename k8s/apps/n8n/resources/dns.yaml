apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: dns

spec:
  endpoints:
    - dnsName: n8n.starry.blue
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
      recordTTL: 1 # Auto
      recordType: CNAME
      targets:
        - gateway.starry.blue

---
apiVersion: mackerel.starry.blue/v1alpha1
kind: ExternalMonitor
metadata:
  name: n8n

spec:
  certificationExpirationCritical: 14
  certificationExpirationWarning: 30
  containsString: ok
  expectedStatusCode: 200
  method: GET
  # responseTimeCritical: 10000
  # responseTimeWarning: 5000
  service: Production
  url: https://n8n.starry.blue/healthz
