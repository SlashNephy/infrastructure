apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: router-route

spec:
  routes:
    - kind: Rule
      match: Host(`router.starry.blue`)
      priority: 10
      services:
        - name: router
          nativeLB: true
          port: http
      middlewares:
        - name: forward-auth-authentik
          namespace: authentik

    - kind: Rule
      match: Host(`router.starry.blue`) && PathPrefix(`/outpost.goauthentik.io/`)
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: http

---
apiVersion: v1
kind: Service
metadata:
  name: router

spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
# EndpointSlice リソースは Argo CD Helm Chart の除外リストに入っているため、手動で適用する必要がある
# kubectl apply -n traefik -f ./k8s/system/traefik/lily/resources/routes/router.yaml
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: router
  labels:
    kubernetes.io/service-name: router

addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.1
    conditions:
      ready: true
ports:
  - name: http
    port: 80

---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: dns-router

spec:
  endpoints:
    - dnsName: router.starry.blue
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
      recordTTL: 1 # Auto
      recordType: CNAME
      targets:
        - gateway.starry.blue
