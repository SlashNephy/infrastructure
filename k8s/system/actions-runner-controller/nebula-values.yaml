# TODO: valuesInline に戻す
# https://github.com/actions/actions-runner-controller/issues/3819

controllerServiceAccount:
  name: arc-gha-rs-controller
  namespace: arc-systems
githubConfigSecret: runner-secret

githubConfigUrl: https://github.com/SlashNephy/nebula
maxRunners: 4

minRunners: 0
template:
  spec:
    containers:
      - name: runner
        command:
          - /home/runner/run.sh

        image: ghcr.io/slashnephy/actions-runner:latest@sha256:415e4be0b23c8e8f3de5425d4961977b957366c84ad167e54602e3249ced50aa
        resources:
          limits:
            cpu: 1000m
            memory: 4Gi
