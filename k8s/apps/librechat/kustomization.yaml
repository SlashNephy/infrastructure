apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: librechat

helmCharts:
  # https://www.librechat.ai/docs/local/helm_chart
  - name: librechat
    releaseName: librechat
    namespace: librechat
    version: 2.0.0
    repo: oci://ghcr.io/danny-avila/librechat-chart
    valuesInline:
      global:
        librechat:
          existingSecretName: librechat-secret
      ingress:
        enabled: false
      librechat:
        configEnv:
          ALLOW_EMAIL_LOGIN: "false"
          ALLOW_REGISTRATION: "false"
          ALLOW_SOCIAL_LOGIN: "true"
          DOMAIN_CLIENT: https://librechat.starry.blue
          DOMAIN_SERVER: https://librechat.starry.blue
          OPENID_ADMIN_ROLE: Admin
          OPENID_BUTTON_LABEL: Login with id.starry.blue
          OPENID_CALLBACK_URL: /oauth/openid/callback
          OPENID_GENERATE_NONCE: "true"
          OPENID_ISSUER: https://id.starry.blue/application/o/libre-chat/.well-known/openid-configuration
          OPENID_SCOPE: openid profile email
          OPENID_USE_END_SESSION_ENDPOINT: "true"
          OPENID_USE_PKCE: "true"
          TRUST_PROXY: "1"
        existingSecretName: librechat-secret
      meilisearch:
        auth:
          existingMasterKeySecret: librechat-secret
        enabled: true
      mongodb:
        containerSecurityContext:
          enabled: true
          runAsUser: 1001
        enabled: true
        image:
          # Bitnami の古いタグが削除されているので、legacy イメージを使用する
          # https://github.com/danny-avila/LibreChat/issues/11568
          registry: docker.io
          repository: bitnamilegacy/mongodb
        podSecurityContext:
          enabled: true
          fsGroup: 1001
      redis:
        enabled: true

resources:
  - ./resources/secret.yaml
  - ./resources/volume.yaml
  - ./resources/ingress.yaml
  - ./resources/dns.yaml

patches:
  # デフォルトの configEnv に含まれるダミーシークレット値を削除し、Secret から読ませる
  - target:
      kind: ConfigMap
      name: librechat-librechat-configenv
    patch: |-
      - op: remove
        path: /data/CREDS_KEY
      - op: remove
        path: /data/CREDS_IV
      - op: remove
        path: /data/JWT_SECRET
      - op: remove
        path: /data/JWT_REFRESH_SECRET
