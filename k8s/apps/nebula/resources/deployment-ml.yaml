apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml
  template:
    metadata:
      labels:
        app: ml
    spec:
      containers:
        - name: ml
          image: ghcr.io/slashnephy/nebula-ml:main@sha256:65aab8c1f0b99dce04fc3c83c2936f3bd3272dc56b1385d5af9a5f9dcb5e4d64
          env:
            - name: DEVICE
              value: openvino
            - name: MODEL_CACHE_DIR
              value: /cache
            - name: MAX_MEMORY_MB
              value: "2048"
          envFrom:
            - secretRef:
                name: ml-secrets
          ports:
            - name: http
              containerPort: 8083
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              gpu.intel.com/i915: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: model-cache
          hostPath:
            path: /mnt/local/nebula/ml-model-cache
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
