# TODO: valuesInline に戻す
# https://github.com/actions/actions-runner-controller/issues/3819

controllerServiceAccount:
  name: arc-gha-rs-controller
  namespace: arc-systems
githubConfigSecret: runner-secret

githubConfigUrl: https://github.com/SlashNephy/nebula
maxRunners: 4

minRunners: 0
template:
  spec:
    containers:
      - name: runner
        command:
          - /home/runner/run.sh

        image: ghcr.io/slashnephy/actions-runner:latest@sha256:a23272d471baccae643abc7dd97c64b22b26f28ebb939daf4525e578e2990781
        resources:
          limits:
            cpu: 1000m
            memory: 4Gi
