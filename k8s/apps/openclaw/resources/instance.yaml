apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: agent

spec:
  chromium:
    enabled: true
    image:
      digest: sha256:b8e62abd6e3c631cbf2853e1169f04f9b5f5b8edde0b833df0083997e9b163bb
      repository: ghcr.io/browserless/chromium
      tag: v2.43.0
  config:
    mergeMode: merge
  envFrom:
    - secretRef:
        name: agent-secret
  extraVolumeMounts:
    - name: shared
      mountPath: /shared
  extraVolumes:
    - name: shared
      hostPath:
        path: /mnt/local/openclaw/shared
        type: DirectoryOrCreate
  gateway:
    controlUiOrigins:
      - https://openclaw.starry.blue
    existingSecret: agent-gateway-token
  image:
    digest: sha256:723adc2bb058fd4ab1e00efa52b157e597eead91315e1f1b788b840372fcf048
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.12
  runtimeDeps:
    pnpm: true
    python: true
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - traefik
  selfConfigure:
    allowedActions:
      - skills
      - config
      - workspaceFiles
      - envVars
    enabled: true
  storage:
    persistence:
      existingClaim: agent-data
