        # Cilium SNAT 後の内部 IP (externalTrafficPolicy: Cluster)
        # Cilium の kubeProxyReplacement + loadBalancer.mode: hybrid 環境では
        # externalTrafficPolicy: Local を設定すると RevNAT=0 (リバース DNAT なし) により
        # SYN-ACK が Pod IP のまま送出され Cloudflare 522 タイムアウトが発生する。
        # そのため externalTrafficPolicy: Cluster のままにし、SNAT 後の内部 IP を
        # trustedIPs に含めることで Cloudflare が付与した X-Forwarded-For を信頼させる。
        - 10.0.0.0/8
        - fd00::/104
        - 192.168.0.0/16
        - fdac:2d12:9f5::/64

