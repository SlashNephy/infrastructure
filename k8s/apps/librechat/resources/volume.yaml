apiVersion: v1
kind: PersistentVolume
metadata:
  name: librechat-librechat-images
  labels:
    name: librechat-librechat-images

spec:
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10G
  local:
    path: /mnt/local/librechat/images
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - lily
  persistentVolumeReclaimPolicy: Retain

