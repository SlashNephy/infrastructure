apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: default
  template:
    metadata:
      labels:
        app: default
    spec:
      initContainers:
        - name: db-push
          image: ghcr.io/slashnephy/headlessx-api:2.1.2@sha256:3337c792c21e7856d2dd7585f4482f3d9a9364fd467fcc6ac5f4194f93dba8a3
          command:
            - pnpm
            - exec
            - prisma
            - db
            - push
          envFrom:
            - secretRef:
                name: headlessx-secret
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: api
          image: ghcr.io/slashnephy/headlessx-api:2.1.2@sha256:3337c792c21e7856d2dd7585f4482f3d9a9364fd467fcc6ac5f4194f93dba8a3
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: 0.0.0.0
            - name: NODE_ENV
              value: production
            - name: FRONTEND_URL
              value: https://headlessx.starry.blue
            - name: LOG_LEVEL
              value: debug
            # コンテナ内で Firefox サンドボックスが /proc/self/uid_map に書き込めず子プロセスがクラッシュする問題の回避
            - name: MOZ_DISABLE_CONTENT_SANDBOX
              value: "1"
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          ports:
            - name: api
              containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /app/apps/api/models
            - name: data
              mountPath: /app/apps/api/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
        - name: web
          image: ghcr.io/slashnephy/headlessx-web:2.1.2@sha256:4d85ee8a4c0337181f3eb6d8a14bda791bfb9b8b71ee9b6cb55a165cd0b915f8
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://localhost:8000
            - name: NODE_ENV
              value: production
            - name: WEB_PORT
              value: "3000"
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          ports:
            - name: web
              containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: models
          hostPath:
            path: /mnt/local/headlessx/models
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /mnt/local/headlessx/data
            type: DirectoryOrCreate
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
