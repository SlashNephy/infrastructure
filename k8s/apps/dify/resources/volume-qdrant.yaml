apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-storage-dify-qdrant-0
spec:
  selector:
    matchLabels:
      name: dify-qdrant-data
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dify-qdrant-data
  labels:
    name: dify-qdrant-data

spec:
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10Gi
  local:
    path: /mnt/local/dify/qdrant
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - lily
  persistentVolumeReclaimPolicy: Retain
