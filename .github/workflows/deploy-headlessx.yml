name: Deploy headlessx

on:
  push:
    paths:
      - .github/workflows/deploy-headlessx.yml
  workflow_dispatch:

permissions: {}

jobs:
  build-api:
    # 無限ループすることがある
    if: github.actor != 'StarryBlueSky-bot'
    uses: SlashNephy/actions/.github/workflows/build-docker-image.yml@6c1e1155e0a1b5aaf975544e23d7ff490511a1d9 # v0.0.6
    permissions:
      contents: read
      packages: write
      actions: read
      security-events: write
    with:
      repository: SaifyXPRO/HeadlessX
      # renovate: datasource=github-tags depName=SaifyXPRO/HeadlessX
      ref: v2.1.2
      image-name: ghcr.io/slashnephy/headlessx-api
      dockerfile: infra/docker/api.Dockerfile
      image-platforms: linux/amd64
      dispatch-update-image-digest: true
    secrets:
      dispatch-github-token: ${{ secrets.BOT_GITHUB_TOKEN }}

  build-web:
    # 無限ループすることがある
    if: github.actor != 'StarryBlueSky-bot'
    uses: SlashNephy/actions/.github/workflows/build-docker-image.yml@6c1e1155e0a1b5aaf975544e23d7ff490511a1d9 # v0.0.6
    permissions:
      contents: read
      packages: write
      actions: read
      security-events: write
    with:
      repository: SaifyXPRO/HeadlessX
      # renovate: datasource=github-tags depName=SaifyXPRO/HeadlessX
      ref: v2.1.2
      image-name: ghcr.io/slashnephy/headlessx-web
      dockerfile: infra/docker/web.Dockerfile
      image-platforms: linux/amd64
      dispatch-update-image-digest: true
    secrets:
      dispatch-github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
