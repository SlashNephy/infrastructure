apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubewatch

helmCharts:
  - name: kubewatch
    releaseName: kubewatch
    namespace: kubewatch
    version: 3.5.0
    repo: https://robusta-charts.storage.googleapis.com
    includeCRDs: true
    valuesInline:
      extraEnvVarsSecret: secret
      rbac:
        create: true
        customRoles:
          - apiGroups:
              - events.k8s.io
            resources:
              - events
            verbs:
              - get
              - list
              - watch
      resourcesToWatch:
        daemonset: false
        deployment: false
        event: true

        job: false
        persistentvolume: false
        pod: false
        replicaset: false
        replicationcontroller: false
        services: false
      slack:
        enabled: false
      slackwebhook:
        # 環境変数で注入する
        channel: ""
        enabled: true
        slackwebhookurl: ""
resources:
  - ./resources/secret.yaml
