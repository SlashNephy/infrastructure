apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram

spec:
  replicas: 2
  selector:
    matchLabels:
      app: instagram
  template:
    metadata:
      labels:
        app: instagram
    spec:
      containers:
        - name: instagram
          image: ghcr.io/slashnephy/nebula-instagram:main@sha256:4dae5397c2ec9aff2c6ec2efe9f949003cc9d7b93f28705377be480629eda8b9
          envFrom:
            - secretRef:
                name: instagram-secrets
          ports:
            - name: http
              containerPort: 8085
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
