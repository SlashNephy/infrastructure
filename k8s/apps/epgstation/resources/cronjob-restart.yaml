apiVersion: batch/v1
kind: CronJob
metadata:
  name: restart

spec:
  schedule: "0 2 * * *"
  timeZone: Asia/Tokyo
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          containers:
            - name: restart
              image: ghcr.io/slashnephy/restart-epgstation-deployment:master@sha256:904c06e0479665b23f5346f678fa4e4cf3bcd2a79ad56eaaf2e92f9dac42b799
              env:
                - name: EPGSTATION_URL
                  value: http://app:8888
                - name: K8S_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: K8S_DEPLOYMENT
                  value: deployment
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: restart
  concurrencyPolicy: Forbid

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restart

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: restart

rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      # allow rollout restart
      - get
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: restart

roleRef:
  name: restart
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
subjects:
  - name: restart
    kind: ServiceAccount
