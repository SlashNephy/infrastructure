apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: default
  template:
    metadata:
      labels:
        app: default
    spec:
      initContainers:
        - name: db-push
          image: ghcr.io/slashnephy/headlessx-api:2.1.0@sha256:5b6f9f3b25d17489e7ac8fcb9751a9d9b7e988f600e32d79441e862c1115460b
          command:
            - pnpm
            - exec
            - prisma
            - db
            - push
          envFrom:
            - secretRef:
                name: headlessx-secret
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: api
          image: ghcr.io/slashnephy/headlessx-api:2.1.0@sha256:5b6f9f3b25d17489e7ac8fcb9751a9d9b7e988f600e32d79441e862c1115460b
          # 依存関係が不足している問題に対する一時的なワークアラウンド
          # https://github.com/saifyxpro/HeadlessX/issues/39#issuecomment-4058155138
          command:
            - bash
            - -euxc
            - |
              apt-get update
              apt-get install -y --no-install-recommends libgtk-3-0 libx11-xcb1
              exec pnpm start
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: 0.0.0.0
            - name: NODE_ENV
              value: production
            - name: FRONTEND_URL
              value: https://headlessx.starry.blue
            - name: LOG_LEVEL
              value: debug
            # コンテナ内で Firefox サンドボックスが /proc/self/uid_map に書き込めず子プロセスがクラッシュする問題の回避
            - name: MOZ_DISABLE_CONTENT_SANDBOX
              value: "1"
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          ports:
            - name: api
              containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /app/apps/api/models
            - name: data
              mountPath: /app/apps/api/data
          securityContext:
            allowPrivilegeEscalation: false
        - name: web
          image: ghcr.io/slashnephy/headlessx-web:2.1.0@sha256:296a5acba09419176b242880b1810047eee4b3579dd173cc1043ae1c524a14e7
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://localhost:8000
            - name: NODE_ENV
              value: production
            - name: WEB_PORT
              value: "3000"
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          ports:
            - name: web
              containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: models
          hostPath:
            path: /mnt/local/headlessx/models
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /mnt/local/headlessx/data
            type: DirectoryOrCreate
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
