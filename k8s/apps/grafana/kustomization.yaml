apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana

helmCharts:
  - name: grafana
    releaseName: grafana
    namespace: grafana
    version: 11.3.8
    repo: oci://ghcr.io/grafana-community/helm-charts
    includeCRDs: true
    valuesInline:
      admin:
        existingSecret: grafana-secret
        passwordKey: GF_SECURITY_ADMIN_PASSWORD
        userKey: GF_SECURITY_ADMIN_USER
      envFromSecrets:
        - name: grafana-secret
      grafana.ini:
        auth.anonymous:
          enabled: true
          hide_version: true
        server:
          domain: grafana.starry.blue
          root_url: https://grafana.starry.blue
      persistence:
        enabled: true
        selectorLabels:
          name: grafana-data

resources:
  - ./resources/dns.yaml
  - ./resources/ingress.yaml
  - ./resources/namespace.yaml
  - ./resources/pv-data.yaml
  - ./resources/secret.yaml
