apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
spec:
  selector:
    matchLabels:
      name: home-assistant-config
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: home-assistant-config
  labels:
    name: home-assistant-config

spec:
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  local:
    path: /mnt/local/home-assistant/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - lily
  persistentVolumeReclaimPolicy: Retain
