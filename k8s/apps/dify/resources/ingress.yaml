apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: route

spec:
  routes:
    - kind: Rule
      match: Host(`dify.starry.blue`)
      services:
        - name: dify-web-svc
          port: web
    - kind: Rule
      match: Host(`dify-api.starry.blue`)
      services:
        - name: dify-api-svc
          port: api
