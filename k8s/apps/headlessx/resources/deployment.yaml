apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: default
  template:
    metadata:
      labels:
        app: default
    spec:
      initContainers:
        - name: db-push
          image: ghcr.io/slashnephy/headlessx-api:2.0@sha256:1d29e9cb2237ec7f10167280b852983709fb0dfe5cfe3d370a1edb14d10df940.4
          command:
            - pnpm
            - exec
            - prisma
            - db
            - push
          envFrom:
            - secretRef:
                name: headlessx-secret
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: api
          image: ghcr.io/slashnephy/headlessx-api:2.0@sha256:1d29e9cb2237ec7f10167280b852983709fb0dfe5cfe3d370a1edb14d10df940.4
          # 依存関係が不足している問題に対する一時的なワークアラウンド
          # https://github.com/saifyxpro/HeadlessX/issues/39#issuecomment-4058155138
          command:
            - bash
            - -euxc
            - |
              apt-get update
              apt-get install -y --no-install-recommends libgtk-3-0 libx11-xcb1
              exec pnpm start
          ports:
            - name: api
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: 0.0.0.0
            - name: NODE_ENV
              value: production
            - name: FRONTEND_URL
              value: https://headlessx.starry.blue
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          volumeMounts:
            - name: models
              mountPath: /app/apps/api/models
            - name: data
              mountPath: /app/apps/api/data
          securityContext:
            allowPrivilegeEscalation: false
        - name: web
          image: ghcr.io/slashnephy/headlessx-web:2.0.4@sha256:b845b74e04b8a311d2afa2ba6f4a6ce79fa83eba4c984b2e61cf28304de1656b
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://localhost:8000
            - name: NODE_ENV
              value: production
            - name: WEB_PORT
              value: "3000"
            - name: TZ
              value: Asia/Tokyo
          envFrom:
            - secretRef:
                name: headlessx-secret
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: models
          hostPath:
            path: /mnt/local/headlessx/models
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /mnt/local/headlessx/data
            type: DirectoryOrCreate
      imagePullSecrets:
        - name: ghcr-io-credentials
      restartPolicy: Always
