apiVersion: apps/v1
kind: Deployment
metadata:
  name: xctid

spec:
  replicas: 2
  selector:
    matchLabels:
      app: xctid
  template:
    metadata:
      labels:
        app: xctid
    spec:
      containers:
        - name: xctid
          image: ghcr.io/slashnephy/nebula-xctid:main@sha256:0da28386987995e09da3e3cf2586c6b83334c6d950ac4f41da264bbec370df57
          ports:
            - name: http
              containerPort: 8084
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
