apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dify

helmCharts:
  # https://langgenius.github.io/dify-helm/
  - name: dify
    releaseName: dify
    namespace: dify
    version: 3.8.0
    repo: https://langgenius.github.io/dify-helm
    includeCRDs: true
    valuesInline:
      api:
        enabled: true
        replicas: 1

      # Enterprise 関連は無効化 (セルフホスト版)
      enterprise:
        enabled: false
      enterpriseAudit:
        enabled: false
      enterpriseCollector:
        enabled: false
      enterpriseFrontend:
        enabled: false

      externalDatabase:
        enabled: false

      externalRedis:
        enabled: false

      global:
        appApiDomain: dify.starry.blue
        appSecretKey: dummy # 1Password で管理するのでダミー値を設定
        appWebDomain: dify.starry.blue
        consoleApiDomain: dify.starry.blue
        consoleWebDomain: dify.starry.blue
        customCA:
          enabled: false
        dbMigrationEnabled: true
        edition: SELF_HOSTED
        enterpriseDomain: dify-enterprise-dummy.internal
        filesDomain: dify.starry.blue
        innerApiKey: dummy # 1Password で管理するのでダミー値を設定
        marketplace:
          apiUrl: "https://marketplace.dify.ai"
          enabled: true
          url: "https://marketplace.dify.ai"
        otel:
          enabled: false
        rag:
          etlType: dify
          keywordDataSourceType: object_storage
        serviceApiDomain: dify.starry.blue
        triggerDomain: ""
        useTLS: true

      ingress:
        enabled: false

      mail:
        type: ""

      minio:
        enabled: false

      persistence:
        local:
          annotations:
            helm.sh/resource-policy: keep
          mountPath: /app/api/storage
          persistentVolumeClaim:
            existingClaim: dify-storage
        type: local

      # plugin_daemon を無効化 (plugin-connector, crd-controller も連動して無効化される)
      plugin_daemon:
        enabled: false

      plugin_manager:
        enabled: false

      postgresql:
        enabled: true
        global:
          postgresql:
            auth:
              database: dify
              postgresPassword: dummy
          storageClass: local
        primary:
          extraEnvVars:
            - name: TZ
              value: Asia/Tokyo
          persistence:
            existingClaim: dify-postgresql-data
          resourcesPreset: nano

      qdrant:
        enabled: false

      redis:
        enabled: true
        global:
          redis:
            password: dummy
        master:
          persistence:
            enabled: false
        replica:
          persistence:
            enabled: false
          replicaCount: 0

      sandbox:
        enabled: true
        replicas: 1

      ssrfProxy:
        enabled: true
        replicas: 1

      # triggerWorker は Enterprise 機能のため無効化
      triggerWorker:
        enabled: false

      # unstructured はイメージプルできないため無効化
      unstructured:
        enabled: false

      vectorDB:
        externalType: qdrant
        useExternal: false

      weaviate:
        enabled: false

      web:
        enabled: true
        replicas: 1

      worker:
        enabled: true
        replicas: 1

      workerBeat:
        enabled: true

resources:
  - ./resources/dns.yaml
  - ./resources/ingress.yaml
  - ./resources/secret.yaml
  - ./resources/volume-postgresql.yaml
  - ./resources/volume-storage.yaml

patches:
  # dify-postgresql / dify-redis Secret は 1Password で管理されるので自動で作成されるシークレットを空にする
  - target:
      version: v1
      kind: Secret
      name: dify-postgresql
    patch: |-
      - op: remove
        path: /data
  - target:
      version: v1
      kind: Secret
      name: dify-redis
    patch: |-
      - op: remove
        path: /data
  # Enterprise gateway は不要なので replicas を 0 にする
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dify-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
