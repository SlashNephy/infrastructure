apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-cleanup-backup

spec:
  schedule: "0 * * * *"
  timeZone: Asia/Tokyo
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          containers:
            - name: app
              image: public.ecr.aws/debian/debian:stable-slim@sha256:8f904ca2360f88f3af28c3208279ea330600a35cba7659007d1eb7e656e77512
              workingDir: /backup
              command:
                - bash
                - -c
                - ls -1r pg_dumpall-*.pgdump | tail -n +$((KEEP_COUNT + 1)) | xargs -r rm -v
              env:
                - name: KEEP_COUNT
                  value: "3"
              volumeMounts:
                - name: backup
                  mountPath: /backup
              securityContext:
                allowPrivilegeEscalation: false
          volumes:
            - name: backup
              hostPath:
                path: /mnt/local/n8n/postgresql-backup
                type: Directory
          restartPolicy: Never
  concurrencyPolicy: Forbid
