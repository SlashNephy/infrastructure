apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: agent

spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.11
    digest: sha256:c7ca55eb5668abe48fa98f03aeed6e4c596a169992f149767d743e19e24acbf9
  config:
    mergeMode: merge
  envFrom:
    - secretRef:
        name: agent-secret
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - traefik
  storage:
    persistence:
      existingClaim: agent-data
  extraVolumes:
    - name: shared
      hostPath:
        path: /mnt/local/openclaw/shared
        type: DirectoryOrCreate
  extraVolumeMounts:
    - name: shared
      mountPath: /shared
  gateway:
    existingSecret: agent-gateway-token
    controlUiOrigins:
      - https://openclaw.starry.blue
  runtimeDeps:
    pnpm: true
    python: true
  chromium:
    enabled: true
    image:
      repository: ghcr.io/browserless/chromium
      tag: v2.42.0
      digest: sha256:09648c90e8f986467db16978a822e9d698e1d4dcfea7fe0b04e5283971d668fe
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - config
      - workspaceFiles
      - envVars
