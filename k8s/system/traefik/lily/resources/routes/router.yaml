apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: router-route

spec:
  routes:
    - kind: Rule
      match: Host(`router.starry.blue`)
      priority: 10
      services:
        - name: external-router
          port: 80
      middlewares:
        - name: forward-auth-authentik
          namespace: authentik

    - kind: Rule
      match: Host(`router.starry.blue`) && PathPrefix(`/outpost.goauthentik.io/`)
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: http

---
apiVersion: v1
kind: Service
metadata:
  name: external-router

spec:
  type: ExternalName
  externalName: 192.168.1.1

---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: dns-router

spec:
  endpoints:
    - dnsName: router.starry.blue
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
      recordTTL: 1 # Auto
      recordType: CNAME
      targets:
        - gateway.starry.blue
