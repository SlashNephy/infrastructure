apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram

spec:
  replicas: 2
  selector:
    matchLabels:
      app: instagram
  template:
    metadata:
      labels:
        app: instagram
    spec:
      containers:
        - name: instagram
          image: ghcr.io/slashnephy/nebula-instagram:main@sha256:6298484aee1990b17f18de8b8b9dbb40c432bd400b5552567039049f5da8a590
          envFrom:
            - secretRef:
                name: instagram-secrets
          ports:
            - name: http
              containerPort: 8085
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-io-credentials
      securityContext:
        seccompProfile:
          type: RuntimeDefault
